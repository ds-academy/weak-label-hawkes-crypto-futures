<svg xmlns="http://www.w3.org/2000/svg" width="780" height="290" viewBox="0 0 780 290" role="img">
<style>
  .title { font: 700 24px Georgia, serif; fill: #223; }
  .subtitle { font: 14px Georgia, serif; fill: #556; }
  .label { font: 14px Georgia, serif; fill: #223; }
  .value { font: 700 14px Georgia, serif; fill: #223; }
  .small { font: 12px Georgia, serif; fill: #733; }
</style>
<rect width="100%" height="100%" fill="#fbf8f1"/>

<text x="30" y="36" class="title">M1-vs-M0 LRT p-values</text>
<text x="30" y="58" class="subtitle">Both cohorts are far above the 0.05 reference line.</text>
<line x1="282.0" y1="70" x2="282.0" y2="245" stroke="#a33" stroke-dasharray="4 4"/>
<text x="288.0" y="76" class="small">p=0.05</text>
<text x="30" y="103" class="label">main M1 p-value</text>
<rect x="260" y="80" width="293.2" height="30" rx="4" fill="#5f6f91"/>
<text x="561.2" y="101" class="value">0.666</text>
<text x="30" y="173" class="label">robustness_symbol M1 p-value</text>
<rect x="260" y="150" width="439.7" height="30" rx="4" fill="#5f6f91"/>
<text x="707.7" y="171" class="value">0.999</text>
</svg>
